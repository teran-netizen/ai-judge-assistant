# ═══════════════════════════════════════════════════════════════
# AI Judge — Nginx Configuration (Security-hardened + SSL)
# ═══════════════════════════════════════════════════════════════

# ── Rate Limiting Zones ──
limit_req_zone $binary_remote_addr zone=general:10m rate=15r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=heavy:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=3r/m;

# ── Connection Limits ──
limit_conn_zone $binary_remote_addr zone=addr:10m;
limit_req_status 429;
limit_conn_status 429;

# ── Логирование для fail2ban ──
log_format security '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time '
                    'limit_req=$limit_req_status';

# ═══════════════════════════════════════════════════════════════
# HTTP → HTTPS redirect + ACME challenge для certbot
# ═══════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name example.com www.example.com;

    # Certbot ACME challenge (нужен для получения/обновления SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное — редирект на HTTPS
    # Если SSL ещё не настроен — nginx не поднимет 443 блок,
    # и этот сервер будет обслуживать трафик напрямую (fallback ниже)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ═══════════════════════════════════════════════════════════════
# HTTPS (основной сервер)
# Активируется только если сертификат существует.
# При первом запуске (до init-ssl.sh) этот блок игнорируется —
# nginx просто не найдёт файл и пропустит.
# ═══════════════════════════════════════════════════════════════
server {
    listen 443 ssl default_server;
    http2 on;
    server_name example.com www.example.com;

    # ── SSL сертификаты (Let's Encrypt) ──
    ssl_certificate     /etc/letsencrypt/live/ai-judge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-judge/privkey.pem;

    # ── SSL настройки (Mozilla Modern) ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log security;
    error_log /var/log/nginx/error.log warn;

    # ── Connection Limits ──
    limit_conn addr 50;

    # ── Timeouts (Slowloris protection) ──
    client_header_timeout 10s;
    client_body_timeout 30s;
    send_timeout 15s;
    keepalive_timeout 30s;
    keepalive_requests 100;

    # ── Request Size Limits ──
    client_max_body_size 1m;
    large_client_header_buffers 4 8k;

    # ── Скрываем версию nginx ──
    server_tokens off;

    # ── Скрываем backend headers ──
    proxy_hide_header Server;
    proxy_hide_header X-Powered-By;

    # ── Security Headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru https://mc.yandex.com https://yastatic.net https://code.jivo.ru https://script.jivo.ru; script-src-elem 'self' 'unsafe-inline' https://mc.yandex.ru https://mc.yandex.com https://yastatic.net https://code.jivo.ru https://script.jivo.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://code.jivo.ru; img-src 'self' data: blob: https://mc.yandex.ru https://mc.yandex.com https://mc.yandex.az https://*.jivo.ru; media-src 'self' blob: https://*.jivo.ru; connect-src 'self' https://mc.yandex.ru https://mc.yandex.com https://mc.webvisor.com https://*.jivo.ru wss://mc.yandex.com wss://mc.webvisor.com wss://*.jivo.ru; font-src 'self' https://fonts.gstatic.com; object-src 'none'; frame-ancestors 'self'; frame-src 'self' https://mc.yandex.com https://*.jivo.ru; child-src 'self' https://mc.yandex.com https://*.jivo.ru; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "microphone=(), geolocation=(), camera=(self)" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Блокировка подозрительных User-Agent ──
    if ($http_user_agent = "") { return 444; }
    if ($http_user_agent ~* (nikto|sqlmap|dirbuster|nmap|masscan|zgrab|gobuster|nuclei|httpx-toolkit)) {
        return 444;
    }

    # ── Блокировка опасных URL-паттернов ──
    location ~* /\.(env|git|svn|htaccess|htpasswd|DS_Store) {
        return 444;
    }
    location ~* /(wp-admin|wp-login|wp-content|phpmyadmin|phpinfo|admin\.php|xmlrpc\.php|eval-stdin) {
        return 444;
    }
    location ~* /\.(php|asp|aspx|jsp|cgi|sh|bak|sql|swp)$ {
        return 444;
    }

    # ── Health check (без rate limit) ──
    location = /health {
        proxy_pass http://app:8000;
    }
    location = /health/bundle {
        proxy_pass http://app:8000;
    }

    # ── OAuth Callbacks ──
    location ~ ^/api/auth/(yandex|vk)/callback {
        limit_req zone=login burst=5 nodelay;
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 20s;
    }

    # ── File Upload ──
    location ~ ^/api/cases/[^/]+/files$ {
        limit_req zone=upload burst=5 nodelay;
        client_max_body_size 100m;
        client_body_timeout 300s;

        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
    }

    # ── Generate / Refine (LLM) ──
    location ~ ^/api/cases/[^/]+/(generate|refine)$ {
        limit_req zone=heavy burst=3 nodelay;

        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 1800s;
        proxy_buffering off;
    }

    # ── Billing Webhooks ──
    location = /api/billing/webhook/alfa {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 15s;
    }

    # ── Case Process SSE (обработка документов: OCR + DeepSeek) ──
    location ~ ^/api/cases/[^/]+/process$ {
        limit_req zone=api burst=15 nodelay;

        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # ── Case Stream SSE (стриминг генерации) ──
    location ~ ^/api/cases/[^/]+/stream$ {
        limit_req zone=api burst=15 nodelay;

        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ── Chat SSE (стриминг) ──
    location /api/chat/ {
        limit_req zone=api burst=15 nodelay;

        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ── General API ──
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 30s;
        proxy_buffering off;

        client_max_body_size 5m;
    }

    # ── Статические документы ──
    location /docs/ {
        limit_req zone=general burst=10 nodelay;
        proxy_pass http://app:8000;
    }

    # ── SEO: статические страницы (перехват до SPA) ──
location = /portfolio-case {
    try_files /pages/portfolio-case.html =404;
}
location = /ии-юрист {
    try_files /ии-юрист/index.html =404;
}
location = /ии-юрист/ {
    try_files /ии-юрист/index.html =404;
}
location = /виджет-ии-юрист {
    try_files /виджет-ии-юрист/index.html =404;
}
location = /виджет-ии-юрист/ {
    try_files /виджет-ии-юрист/index.html =404;
}
location = /ii-yurist {
    try_files /ии-юрист/index.html =404;
}
location = /widget-ai-lawyer {
    try_files /виджет-ии-юрист/index.html =404;
}
location = /blog {
    try_files /pages/blog/index.html =404;
}
    location = /blog/ {
