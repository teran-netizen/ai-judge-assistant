    }
    location ~ ^/reviews/(.+)$ {
        try_files /pages/reviews/$1.html =404;
    }
    # -- Decisions pages --
    location = /decisions {
        try_files /pages/decisions/index.html =404;
    }
    location ~ ^/decisions/(.+)$ {
        try_files /pages/decisions/$1.html =404;
    }
    # -- Additional sitemaps --
    location = /sitemap-articles.xml {
        try_files /sitemap-articles.xml =404;
    }
    location = /sitemap-codex.xml {
        try_files /sitemap-codex.xml =404;
    }
    location = /sitemap-decisions.xml {
        try_files /sitemap-decisions.xml =404;
    }
    location = /sitemap-documents.xml {
        try_files /sitemap-documents.xml =404;
    }
    location = /sitemap-reviews.xml {
        try_files /sitemap-reviews.xml =404;
    }
        try_files /sitemap-index.xml =404;
    }
    location = /sitemap-plenums.xml {
        try_files /sitemap-plenums.xml =404;
    }
    location = /sitemap.xml {
        try_files /sitemap.xml =404;
    }
    location = /robots.txt {
        try_files /robots.txt =404;
    }

    # ── SPA ──
    location / {
        limit_req zone=general burst=30 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # ── Кэширование статики ──
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "microphone=(), geolocation=(), camera=(self)" always;
    }

    # ── Не кэшировать index.html ──
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru https://mc.yandex.com https://yastatic.net https://code.jivo.ru https://script.jivo.ru; script-src-elem 'self' 'unsafe-inline' https://mc.yandex.ru https://mc.yandex.com https://yastatic.net https://code.jivo.ru https://script.jivo.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://code.jivo.ru; img-src 'self' data: blob: https://mc.yandex.ru https://mc.yandex.com https://mc.yandex.az https://*.jivo.ru; media-src 'self' blob: https://*.jivo.ru; connect-src 'self' https://mc.yandex.ru https://mc.yandex.com https://mc.webvisor.com https://*.jivo.ru wss://mc.yandex.com wss://mc.webvisor.com wss://*.jivo.ru; font-src 'self' https://fonts.gstatic.com; object-src 'none'; frame-ancestors 'self'; frame-src 'self' https://mc.yandex.com https://*.jivo.ru; child-src 'self' https://mc.yandex.com https://*.jivo.ru; base-uri 'self'; form-action 'self'" always;
        add_header Permissions-Policy "microphone=(), geolocation=(), camera=(self)" always;
    }
}
