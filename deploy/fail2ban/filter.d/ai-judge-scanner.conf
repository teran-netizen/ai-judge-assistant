# AI Judge: detect vulnerability scanners
# Catches attempts to access .env, .git, wp-admin, phpmyadmin, etc.
# Nginx returns 444 (connection reset) for these — they show as 0 bytes in log
[Definition]
failregex = ^<HOST> .* "(GET|POST|HEAD) .*(\.env|\.git|wp-admin|wp-login|phpmyadmin|phpinfo|xmlrpc|eval-stdin|\.php|\.asp|\.bak|\.sql).*" (404|444|400)
            ^<HOST> .* "(GET|POST|HEAD) .* HTTP/.*" 444
ignoreregex =
